services:

  orange_mock:
    image: eclipse-mosquitto
    ports:
      - "${BRK_PORT}:1883"
    environment:
      - MOSQUITTO_USERNAME=${BRK_USER}
      - MOSQUITTO_PASSWORD=${BRK_PSW}
    restart: unless-stopped
    networks:
      - pfe_network
    healthcheck:
      test: [ "CMD", "mosquitto_sub", "-t", "$SYS/broker/uptime", "-C", "1", "-u", "${BRK_USER}", "-P", "${BRK_PSW}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    ports:
      - ${DB_PORT}:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${DB_PSW}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_DB=${DB_NAME}
    networks:
      - pfe_network
    depends_on:
      - orange_mock
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:

networks:
  pfe_network:
    driver: bridge
